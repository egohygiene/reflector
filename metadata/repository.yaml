  doi:
    enabled: false
    provider: null             # TODO: replace with DOI provider when assigned
  huggingface:
    enabled: false
    space_url: null            # TODO: replace with Hugging Face Space URL when created
  implementation_repo:
    enabled: false
    url: null                  # TODO: replace with companion implementation repo URL

# ============================================================
# Canonical Repository Metadata
#
# Single source of truth for all repository-level metadata
# used across the publication pipeline: workflows, release
# manifests, GitHub Pages, and any future renderer targets.
# ============================================================

# ---------------------------------------------------------------------------
# Repository identity
# ---------------------------------------------------------------------------

name: reflector
owner: egohygiene
github_url: "https://github.com/egohygiene/reflector"
pages_url: "https://egohygiene.github.io/reflector/"

# ---------------------------------------------------------------------------
# Publication status and release
# ---------------------------------------------------------------------------

status: draft
release_channel: github-releases
version_source: VERSION
changelog: CHANGELOG.md
citation_source: CITATION.cff
tag_pattern: "vMAJOR.MINOR.PATCH"


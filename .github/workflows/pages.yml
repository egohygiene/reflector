name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "paper/**"
      - "magazine/**"
      - ".github/workflows/pages.yml"
      - "scripts/build-paper.sh"
      - "scripts/build-magazine.sh"
  workflow_dispatch:
    inputs:
      deploy_scope:
        description: "Pages scope: auto, paper, magazine, full"
        required: false
        default: "auto"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine deployment scope
        id: scope
        run: |
          set -euo pipefail

          EVENT="${{ github.event_name }}"
          SCOPE_INPUT="${{ github.event.inputs.deploy_scope || 'auto' }}"
          BUILD_PAPER="false"
          BUILD_MAGAZINE="false"

          if [[ "${EVENT}" == "workflow_dispatch" ]]; then
            case "${SCOPE_INPUT}" in
              auto|full)
                BUILD_PAPER="true"
                BUILD_MAGAZINE="true"
                ;;
              paper)
                BUILD_PAPER="true"
                ;;
              magazine)
                BUILD_MAGAZINE="true"
                ;;
              *)
                echo "::error::Invalid deploy_scope='${SCOPE_INPUT}'. Use auto, paper, magazine, or full."
                exit 1
                ;;
            esac
          else
            echo "Push event detected; rebuilding all publication PDFs to guarantee complete Pages artifacts."
            BUILD_PAPER="true"
            BUILD_MAGAZINE="true"
          fi

          echo "build_paper=${BUILD_PAPER}" >> "$GITHUB_OUTPUT"
          echo "build_magazine=${BUILD_MAGAZINE}" >> "$GITHUB_OUTPUT"

      - name: Install preview tooling
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes poppler-utils webp

      - name: Build reflector PDF
        if: steps.scope.outputs.build_paper == 'true'
        uses: xu-cheng/latex-action@v4
        with:
          root_file: paper.tex
          working_directory: paper
          extra_system_packages: "biber"
          args: >-
            -pdf
            -halt-on-error
            -interaction=nonstopmode
            -recorder
            -synctex=1
            -file-line-error
            -shell-escape
            -f
            -gg
            -cd
            -r
            ../.latexmkrc

      - name: Print LaTeX diagnostics on failure
        if: failure() && steps.scope.outputs.build_paper == 'true'
        run: ./scripts/print-latex-diagnostics.sh paper

      - name: Build reflector magazine PDF (digital)
        if: steps.scope.outputs.build_magazine == 'true'
        uses: xu-cheng/latex-action@v4
        with:
          root_file: tex/magazine.tex
          working_directory: magazine
          args: >-
            -pdf
            -halt-on-error
            -interaction=nonstopmode
            -recorder
            -file-line-error
            -f
            -gg
            -cd
            -r
            tex/.latexmkrc

      - name: Build reflector magazine PDF (print)
        if: steps.scope.outputs.build_magazine == 'true'
        uses: xu-cheng/latex-action@v4
        with:
          root_file: tex/magazine-print.tex
          working_directory: magazine
          args: >-
            -pdf
            -halt-on-error
            -interaction=nonstopmode
            -recorder
            -file-line-error
            -f
            -gg
            -cd
            -r
            tex/.latexmkrc

      - name: Copy magazine PDFs to dist
        if: steps.scope.outputs.build_magazine == 'true'
        run: |
          set -euo pipefail
          mkdir -p magazine/dist
          cp magazine/.cache/out/magazine.pdf magazine/dist/reflector-magazine.pdf
          cp magazine/.cache/out/magazine-print.pdf magazine/dist/reflector-magazine-print.pdf
          echo "Built: magazine/dist/reflector-magazine.pdf"
          echo "Built: magazine/dist/reflector-magazine-print.pdf"

      - name: Synchronize publication assets into docs
        run: |
          set -euo pipefail

          PAPER_SLUG="reflector"
          HERO_SOURCE="paper/figures/hero.png"
          ROOT_MANIFEST="publication.json"
          DOCS_PDF="docs/${PAPER_SLUG}.pdf"
          DOCS_MAGAZINE_PDF="docs/reflector-magazine.pdf"
          DOCS_MAGAZINE_PRINT_PDF="docs/reflector-magazine-print.pdf"
          DOCS_HERO_DIR="docs/figures"
          DOCS_HERO="${DOCS_HERO_DIR}/hero.png"
          DOCS_MANIFEST="docs/publication.json"

          PDF_SOURCE="docs/reflector.pdf"
          if [[ "${{ steps.scope.outputs.build_paper }}" == "true" ]]; then
            PDF_SOURCE="paper/.cache/out/paper.pdf"
          else
            echo "Paper build skipped; checking for existing docs/reflector.pdf as fallback."
          fi

          MAGAZINE_PDF_SOURCE="docs/reflector-magazine.pdf"
          MAGAZINE_PRINT_PDF_SOURCE="docs/reflector-magazine-print.pdf"
          if [[ "${{ steps.scope.outputs.build_magazine }}" == "true" ]]; then
            MAGAZINE_PDF_SOURCE="magazine/dist/reflector-magazine.pdf"
            MAGAZINE_PRINT_PDF_SOURCE="magazine/dist/reflector-magazine-print.pdf"
          else
            echo "Magazine build skipped; checking for existing docs magazine PDFs as fallback."
          fi

          if [[ ! -f "${PDF_SOURCE}" ]]; then
            if [[ "${{ steps.scope.outputs.build_paper }}" == "true" ]]; then
              echo "Error: Paper was built but PDF not found at '${PDF_SOURCE}'" >&2
              exit 1
            else
              echo "Error: Required fallback PDF not found at '${PDF_SOURCE}'." >&2
              exit 1
            fi
          fi

          if [[ ! -f "${MAGAZINE_PDF_SOURCE}" ]]; then
            if [[ "${{ steps.scope.outputs.build_magazine }}" == "true" ]]; then
              echo "Error: Magazine was built but PDF not found at '${MAGAZINE_PDF_SOURCE}'" >&2
              exit 1
            else
              echo "Error: Required fallback magazine PDF not found at '${MAGAZINE_PDF_SOURCE}'." >&2
              exit 1
            fi
          fi

          if [[ ! -f "${MAGAZINE_PRINT_PDF_SOURCE}" ]]; then
            if [[ "${{ steps.scope.outputs.build_magazine }}" == "true" ]]; then
              echo "Error: Magazine (print) was built but PDF not found at '${MAGAZINE_PRINT_PDF_SOURCE}'" >&2
              exit 1
            else
              echo "Error: Required fallback magazine print PDF not found at '${MAGAZINE_PRINT_PDF_SOURCE}'." >&2
              exit 1
            fi
          fi

          if [[ ! -f "${HERO_SOURCE}" ]]; then
            echo "Error: Expected hero image not found at '${HERO_SOURCE}'" >&2
            exit 1
          fi

          if [[ ! -f "${ROOT_MANIFEST}" ]]; then
            echo "Error: Expected canonical publication manifest not found at '${ROOT_MANIFEST}'" >&2
            exit 1
          fi

          mkdir --parents "${DOCS_HERO_DIR}"
          if [[ -n "${PDF_SOURCE}" && "${PDF_SOURCE}" != "${DOCS_PDF}" ]]; then
            cp "${PDF_SOURCE}" "${DOCS_PDF}"
          fi
          if [[ -n "${MAGAZINE_PDF_SOURCE}" && "${MAGAZINE_PDF_SOURCE}" != "${DOCS_MAGAZINE_PDF}" ]]; then
            cp "${MAGAZINE_PDF_SOURCE}" "${DOCS_MAGAZINE_PDF}"
          fi
          if [[ -n "${MAGAZINE_PRINT_PDF_SOURCE}" && "${MAGAZINE_PRINT_PDF_SOURCE}" != "${DOCS_MAGAZINE_PRINT_PDF}" ]]; then
            cp "${MAGAZINE_PRINT_PDF_SOURCE}" "${DOCS_MAGAZINE_PRINT_PDF}"
          fi
          cp "${HERO_SOURCE}" "${DOCS_HERO}"
          cp "${ROOT_MANIFEST}" "${DOCS_MANIFEST}"

          echo "Published PDF: ${DOCS_PDF}"
          echo "Published magazine PDF: ${DOCS_MAGAZINE_PDF}"
          echo "Published magazine print PDF: ${DOCS_MAGAZINE_PRINT_PDF}"
          echo "Published hero image: ${DOCS_HERO}"
          echo "Published canonical publication manifest: ${DOCS_MANIFEST}"
          echo "docs/ file inventory:"
          find docs -type f | sort

      - name: Generate publication previews
        run: |
          set -euo pipefail
          python3 scripts/generate_pdf_previews.py \
            --output-dir docs/previews \
            --preview paper-cover=docs/reflector.pdf \
            --preview magazine-cover=docs/reflector-magazine.pdf \
            --preview print-cover=docs/reflector-magazine-print.pdf

      - name: Inject build metadata into published manifest
        env:
          GITHUB_SHA_VALUE: ${{ github.sha }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          manifest_path = Path("docs/publication.json")
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          pages_url = manifest["pages_url"].rstrip("/") + "/"
          preview_base = pages_url + "previews/"
          commit_sha = os.environ["GITHUB_SHA_VALUE"]

          manifest["build"] = {
              "generated_at": datetime.now(timezone.utc).replace(microsecond=0).isoformat(),
              "commit_sha": commit_sha,
              "commit_short_sha": commit_sha[:7],
              "publication_status": manifest.get("status", "draft"),
              "source_workflow": "pages.yml",
          }
          manifest["previews"] = {
              "paper": {
                  "path": "previews/paper-cover.webp",
                  "pages_url": preview_base + "paper-cover.webp",
                  "alt": "Preview thumbnail of reflector paper first page",
              },
              "magazine": {
                  "path": "previews/magazine-cover.webp",
                  "pages_url": preview_base + "magazine-cover.webp",
                  "alt": "Preview thumbnail of reflector magazine first page",
              },
              "print": {
                  "path": "previews/print-cover.webp",
                  "pages_url": preview_base + "print-cover.webp",
                  "alt": "Preview thumbnail of reflector print edition first page",
              },
          }

          manifest_path.write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")
          print(f"Enriched {manifest_path} with build metadata and previews.")
          PY

      - name: Verify publication synchronization
        run: |
          set -euo pipefail

          PDF_SOURCE="docs/reflector.pdf"
          if [[ "${{ steps.scope.outputs.build_paper }}" == "true" ]]; then
            PDF_SOURCE="paper/.cache/out/paper.pdf"
          fi
          MAGAZINE_SOURCE="docs/reflector-magazine.pdf"
          MAGAZINE_PRINT_SOURCE="docs/reflector-magazine-print.pdf"
          if [[ "${{ steps.scope.outputs.build_magazine }}" == "true" ]]; then
            MAGAZINE_SOURCE="magazine/dist/reflector-magazine.pdf"
            MAGAZINE_PRINT_SOURCE="magazine/dist/reflector-magazine-print.pdf"
          fi

          DOCS_PDF="docs/reflector.pdf"
          DOCS_MAGAZINE_PDF="docs/reflector-magazine.pdf"
          DOCS_MAGAZINE_PRINT_PDF="docs/reflector-magazine-print.pdf"
          ROOT_MANIFEST="publication.json"

          mkdir --parents _site
          cp --recursive docs/. _site/

          echo "_site/ file inventory:"
          find _site -type f | sort

          # Always-required paths
          for required_path in \
            "docs/reflector.pdf" \
            "docs/reflector-magazine.pdf" \
            "docs/reflector-magazine-print.pdf" \
            "docs/figures/hero.png" \
            "docs/previews/paper-cover.webp" \
            "docs/previews/magazine-cover.webp" \
            "docs/previews/print-cover.webp" \
            "docs/index.html" \
            "docs/publication.json" \
            "_site/reflector.pdf" \
            "_site/reflector-magazine.pdf" \
            "_site/reflector-magazine-print.pdf" \
            "_site/index.html" \
            "_site/figures/hero.png" \
            "_site/previews/paper-cover.webp" \
            "_site/previews/magazine-cover.webp" \
            "_site/previews/print-cover.webp" \
            "_site/publication.json"
          do
            if [[ ! -f "${required_path}" ]]; then
              echo "Error: Expected published file is missing: ${required_path}" >&2
              exit 1
            fi
          done

          for required_path in "${PDF_SOURCE}" "${DOCS_PDF}" "${MAGAZINE_SOURCE}" "${DOCS_MAGAZINE_PDF}" "${MAGAZINE_PRINT_SOURCE}" "${DOCS_MAGAZINE_PRINT_PDF}"; do
            if [[ ! -f "${required_path}" ]]; then
              echo "Error: Expected publication file is missing: ${required_path}" >&2
              exit 1
            fi
          done

          if [[ ! -f "${ROOT_MANIFEST}" ]]; then
            echo "Error: Expected canonical publication manifest is missing: ${ROOT_MANIFEST}" >&2
            exit 1
          fi

          PDF_SOURCE_SHA="$(sha256sum "${PDF_SOURCE}" | awk '{print $1}')"
          PDF_DOCS_SHA="$(sha256sum "${DOCS_PDF}" | awk '{print $1}')"
          PDF_SITE_SHA="$(sha256sum "_site/reflector.pdf" | awk '{print $1}')"
          if [[ "${{ steps.scope.outputs.build_paper }}" == "true" ]]; then
            if [[ "${PDF_SOURCE_SHA}" != "${PDF_DOCS_SHA}" || "${PDF_SOURCE_SHA}" != "${PDF_SITE_SHA}" ]]; then
              echo "Error: reflector.pdf checksum mismatch between built source and published routes." >&2
              exit 1
            fi
          elif [[ "${PDF_DOCS_SHA}" != "${PDF_SITE_SHA}" ]]; then
            echo "Error: reflector.pdf checksum mismatch between docs and _site routes." >&2
            exit 1
          fi

          MAG_SOURCE_SHA="$(sha256sum "${MAGAZINE_SOURCE}" | awk '{print $1}')"
          MAG_DOCS_SHA="$(sha256sum "${DOCS_MAGAZINE_PDF}" | awk '{print $1}')"
          MAG_SITE_SHA="$(sha256sum "_site/reflector-magazine.pdf" | awk '{print $1}')"
          if [[ "${{ steps.scope.outputs.build_magazine }}" == "true" ]]; then
            if [[ "${MAG_SOURCE_SHA}" != "${MAG_DOCS_SHA}" || "${MAG_SOURCE_SHA}" != "${MAG_SITE_SHA}" ]]; then
              echo "Error: reflector-magazine.pdf checksum mismatch between built source and published routes." >&2
              exit 1
            fi
          elif [[ "${MAG_DOCS_SHA}" != "${MAG_SITE_SHA}" ]]; then
            echo "Error: reflector-magazine.pdf checksum mismatch between docs and _site routes." >&2
            exit 1
          fi

          PRINT_SOURCE_SHA="$(sha256sum "${MAGAZINE_PRINT_SOURCE}" | awk '{print $1}')"
          PRINT_DOCS_SHA="$(sha256sum "${DOCS_MAGAZINE_PRINT_PDF}" | awk '{print $1}')"
          PRINT_SITE_SHA="$(sha256sum "_site/reflector-magazine-print.pdf" | awk '{print $1}')"
          if [[ "${{ steps.scope.outputs.build_magazine }}" == "true" ]]; then
            if [[ "${PRINT_SOURCE_SHA}" != "${PRINT_DOCS_SHA}" || "${PRINT_SOURCE_SHA}" != "${PRINT_SITE_SHA}" ]]; then
              echo "Error: reflector-magazine-print.pdf checksum mismatch between built source and published routes." >&2
              exit 1
            fi
          elif [[ "${PRINT_DOCS_SHA}" != "${PRINT_SITE_SHA}" ]]; then
            echo "Error: reflector-magazine-print.pdf checksum mismatch between docs and _site routes." >&2
            exit 1
          fi

          MANIFEST_DOCS_SHA="$(sha256sum "docs/publication.json" | awk '{print $1}')"
          MANIFEST_SITE_SHA="$(sha256sum "_site/publication.json" | awk '{print $1}')"
          if [[ "${MANIFEST_DOCS_SHA}" != "${MANIFEST_SITE_SHA}" ]]; then
            echo "Error: publication.json checksum mismatch between docs and _site routes." >&2
            exit 1
          fi

          echo "Published routes:"
          echo "- /reflector/"
          echo "- /reflector/reflector.pdf"
          echo "- /reflector/reflector-magazine.pdf"
          echo "- /reflector/reflector-magazine-print.pdf"
          echo "- /reflector/publication.json"
          echo "- /reflector/figures/hero.png"
          echo "- /reflector/previews/paper-cover.webp"
          echo "- /reflector/previews/magazine-cover.webp"
          echo "- /reflector/previews/print-cover.webp"

          grep -q 'src="./figures/hero.png"' docs/index.html || { echo 'Error: docs/index.html is missing hero image route.' >&2; exit 1; }
          grep -q 'src="./previews/paper-cover.webp"' docs/index.html || { echo 'Error: docs/index.html is missing paper preview route.' >&2; exit 1; }
          grep -q 'src="./previews/magazine-cover.webp"' docs/index.html || { echo 'Error: docs/index.html is missing magazine preview route.' >&2; exit 1; }
          grep -q 'href="./reflector.pdf"' docs/index.html || { echo 'Error: docs/index.html is missing paper download route.' >&2; exit 1; }
          grep -q 'href="./reflector-magazine.pdf"' docs/index.html || { echo 'Error: docs/index.html is missing magazine download route.' >&2; exit 1; }
          grep -q 'href="./reflector-magazine-print.pdf"' docs/index.html || { echo 'Error: docs/index.html is missing print edition download route.' >&2; exit 1; }
          # Both publication.json references are required: the link is user-facing, while the fetch call powers dynamic metadata in the landing page UI.
          grep -q 'href="./publication.json"' docs/index.html || { echo 'Error: docs/index.html is missing publication manifest link.' >&2; exit 1; }
          grep -q "fetch('./publication.json')" docs/index.html || { echo 'Error: docs/index.html is missing publication manifest fetch call.' >&2; exit 1; }

          python - <<'PY'
          import json
          import re
          from pathlib import Path

          index_path = Path("docs/index.html")
          try:
              index_html = index_path.read_text(encoding="utf-8")
          except FileNotFoundError as error:
              raise SystemExit(
                  f"Error: expected Pages entrypoint is missing: {index_path.as_posix()}"
              ) from error
          iframe_checks = {
              "reflector.pdf": r'<iframe[^>]+title="reflector paper PDF"[^>]+src="./reflector\.pdf"',
              "reflector-magazine.pdf": r'<iframe[^>]+title="reflector magazine PDF"[^>]+src="./reflector-magazine\.pdf"',
              "reflector-magazine-print.pdf": r'<iframe[^>]+title="reflector print edition PDF"[^>]+src="./reflector-magazine-print\.pdf"',
          }
          missing_iframes = [
              filename
              for filename, pattern in iframe_checks.items()
              if not re.search(pattern, index_html, flags=re.DOTALL)
          ]
          if missing_iframes:
              raise SystemExit(
                  "Error: docs/index.html is missing embedded publication iframe routes for: "
                  + ", ".join(missing_iframes)
              )

          manifest_path = Path("docs/publication.json")
          try:
              manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          except json.JSONDecodeError as error:
              raise SystemExit(
                  f"Error: {manifest_path} is not valid JSON at line {error.lineno}, "
                  f"column {error.colno}: {error.msg}"
              ) from error
          required_fields = {
              "version": manifest.get("version"),
              "release_tag": manifest.get("release_tag"),
              "pages_url": manifest.get("pages_url"),
              "preview_paper_path": manifest.get("previews", {}).get("paper", {}).get("path"),
              "preview_magazine_path": manifest.get("previews", {}).get("magazine", {}).get("path"),
              "preview_print_path": manifest.get("previews", {}).get("print", {}).get("path"),
              "generated_at": manifest.get("build", {}).get("generated_at"),
              "commit_sha": manifest.get("build", {}).get("commit_sha"),
              "publication_status": manifest.get("build", {}).get("publication_status"),
              "paper_pages_url": manifest.get("artifacts", {}).get("paper", {}).get("pages_url"),
              "magazine_pages_url": manifest.get("artifacts", {}).get("magazine", {}).get("pages_url"),
              "magazine_print_pages_url": manifest.get("artifacts", {}).get("magazine", {}).get("print_pages_url"),
          }
          missing = [name for name, value in required_fields.items() if not value]
          if missing:
              raise SystemExit(
                  "Error: docs/publication.json is missing required publication fields: "
                  + ", ".join(missing)
              )
          print("publication.json contains required publication metadata fields.")
          PY

          VERSION="$(tr -d '[:space:]' < VERSION)"
          PDF_SIZE="$(wc -c < "${DOCS_PDF}" | tr -d '[:space:]')"
          MAG_SIZE="$(wc -c < "${DOCS_MAGAZINE_PDF}" | tr -d '[:space:]')"
          PRINT_SIZE="$(wc -c < "${DOCS_MAGAZINE_PRINT_PDF}" | tr -d '[:space:]')"
          {
            echo "## Pages Deployment Summary"
            echo ""
            echo "| Artifact | Version | Size (bytes) | Checksum (sha256) | Deployment Target |"
            echo "| --- | --- | ---: | --- | --- |"
            echo "| reflector.pdf | ${VERSION} | ${PDF_SIZE} | \`${PDF_DOCS_SHA}\` | /reflector/reflector.pdf |"
            echo "| reflector-magazine.pdf | ${VERSION} | ${MAG_SIZE} | \`${MAG_DOCS_SHA}\` | /reflector/reflector-magazine.pdf |"
            echo "| reflector-magazine-print.pdf | ${VERSION} | ${PRINT_SIZE} | \`${PRINT_DOCS_SHA}\` | /reflector/reflector-magazine-print.pdf |"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: reflector-pages-build-artifacts
          path: |
            paper/.cache/
            magazine/.cache/
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 7

      - name: Print Pages staging diagnostics on failure
        if: failure()
        run: |
          set +e
          for path in docs _site paper/.cache/out magazine/dist magazine/.cache/out; do
            if [[ -e "${path}" ]]; then
              echo "::group::${path}"
              find "${path}" -maxdepth 2 \( -type f -o -type d \) | sort
              echo "::endgroup::"
            else
              echo "Missing diagnostic path: ${path}"
            fi
          done

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Validate published publication URLs
        run: |
          set -euo pipefail
          BASE_URL="${{ steps.deployment.outputs.page_url }}"
          URLS=(
            "${BASE_URL}"
            "${BASE_URL}reflector.pdf"
            "${BASE_URL}reflector-magazine.pdf"
            "${BASE_URL}reflector-magazine-print.pdf"
            "${BASE_URL}publication.json"
            "${BASE_URL}figures/hero.png"
            "${BASE_URL}previews/paper-cover.webp"
            "${BASE_URL}previews/magazine-cover.webp"
            "${BASE_URL}previews/print-cover.webp"
          )

          for url in "${URLS[@]}"; do
            echo "Checking ${url}"
            success="false"
            for attempt in 1 2 3 4 5; do
              if curl --silent --show-error --location --fail --head "${url}" >/dev/null; then
                success="true"
                break
              fi
              echo "Attempt ${attempt} failed for ${url}; retrying..."
              sleep 10
            done

            if [[ "${success}" != "true" ]]; then
              echo "Error: published URL check failed for ${url}" >&2
              exit 1
            fi
          done

      - name: Print deployed Pages endpoint
        run: |
          set -euo pipefail
          echo "Deployed page_url: ${{ steps.deployment.outputs.page_url }}"
          echo "Route checks:"
          echo "- ${{ steps.deployment.outputs.page_url }}"
          echo "- ${{ steps.deployment.outputs.page_url }}reflector.pdf"
          echo "- ${{ steps.deployment.outputs.page_url }}reflector-magazine.pdf"
          echo "- ${{ steps.deployment.outputs.page_url }}reflector-magazine-print.pdf"
          echo "- ${{ steps.deployment.outputs.page_url }}previews/paper-cover.webp"
          echo "- ${{ steps.deployment.outputs.page_url }}previews/magazine-cover.webp"
          echo "- ${{ steps.deployment.outputs.page_url }}previews/print-cover.webp"

name: Publication

on:
  push:
    branches:
      - main
    paths:
      - "VERSION"
      - "metadata/**"
      - "paper/**/*.tex"
      - "paper/**/*.bib"
      - "paper/**/*.sty"
      - "paper/**/sections/**"
      - "paper/**/macros/**"
      - "paper/**/styles/**"
      - "paper/**/figures/**"
      - "paper/**/references/**"
      - "magazine/**"
      - "publication.json"
      - "release-manifest.json"
      - "CITATION.cff"
      - ".zenodo.json"
      - ".latexmkrc"
      - ".chktexrc"
      - "scripts/build-paper.sh"
      - "scripts/build-magazine.sh"
      - "scripts/validate-metadata.py"
      - "scripts/validate-release-lifecycle.py"
      - "scripts/validate-arxiv-packaging.py"
      - "scripts/validate-build-reproducibility.py"
      - "scripts/audit-publication-readiness.py"
      - "scripts/audit-chktex.py"
      - "scripts/lint-paper.sh"
      - ".github/workflows/publication.yml"

  workflow_dispatch:
    inputs:
      paper:
        description: "Paper directory"
        required: false
        default: "paper"
      dry_run:
        description: "Dry run — skip GitHub Release creation (true/false)"
        required: false
        default: "false"
      fail_on_warnings:
        description: "Fail if ChkTeX warnings are found (true/false)"
        required: false
        default: "false"

permissions:
  contents: write

# Cancel any in-progress publication run for the same branch.
concurrency:
  group: publication-${{ github.ref }}
  cancel-in-progress: true

# ============================================================
# JOBS
# ============================================================

jobs:

  # ============================================================
  # STAGE 1 — VALIDATE
  # Synchronization, metadata, release lifecycle, arXiv packaging,
  # build reproducibility, and publication readiness.
  # All validation failures block downstream stages.
  # ============================================================

  validate:
    name: Validate Publication
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install --quiet pyyaml>=6.0

      - name: Validate metadata synchronization
        run: python scripts/validate-metadata.py

      - name: Validate release lifecycle contracts
        run: python scripts/validate-release-lifecycle.py

      - name: Validate arXiv packaging readiness
        run: python scripts/validate-arxiv-packaging.py

      - name: Validate build reproducibility
        run: python scripts/validate-build-reproducibility.py

      - name: Run publication readiness audit
        run: python scripts/audit-publication-readiness.py

      - name: Upload publication readiness report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: publication-readiness-report
          path: audits/publication-readiness.md
          if-no-files-found: warn
          retention-days: 30

  # ============================================================
  # STAGE 1 — VALIDATE REUSE (runs in parallel with validate)
  # REUSE 3.x compliance check.
  # ============================================================

  validate-reuse:
    name: Validate REUSE Compliance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check REUSE compliance
        uses: fsfe/reuse-action@v6

  # ============================================================
  # STAGE 2 — AUDIT (runs in parallel with validate)
  # ChkTeX static analysis and audit report generation.
  # ============================================================

  audit-chktex:
    name: ChkTeX Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine paper directory
        id: vars
        run: |
          set -euo pipefail
          PAPER="${{ github.event.inputs.paper || 'paper' }}"
          echo "paper=${PAPER}" >> "$GITHUB_OUTPUT"

      - name: Install ChkTeX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends chktex
          chktex --version

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run ChkTeX lint
        id: lint
        run: |
          set -euo pipefail

          PAPER="${{ steps.vars.outputs.paper }}"
          CHKTEX_OUT="chktex-output.txt"

          ./scripts/lint-paper.sh "${PAPER}" --output "${CHKTEX_OUT}" || true

          WARNING_COUNT="$(grep -cE '^.+:[0-9]+:[0-9]+:[0-9]+:.+$' "${CHKTEX_OUT}" || true)"
          echo "warning_count=${WARNING_COUNT}" >> "$GITHUB_OUTPUT"
          echo "output_file=${CHKTEX_OUT}" >> "$GITHUB_OUTPUT"

          if [[ "${WARNING_COUNT}" -gt 0 ]]; then
            echo "::warning::ChkTeX found ${WARNING_COUNT} warning(s)."
          else
            echo "✅ ChkTeX: no warnings found."
          fi

      - name: Generate ChkTeX audit report
        if: always()
        run: |
          python scripts/audit-chktex.py \
            --paper "${{ steps.vars.outputs.paper }}" \
            --output audits/chktex-audit.md

      - name: Print ChkTeX audit report
        if: always()
        run: |
          echo "::group::ChkTeX Audit Report"
          cat audits/chktex-audit.md
          echo "::endgroup::"

      - name: Annotate ChkTeX warnings
        if: always() && steps.lint.outputs.warning_count != '0'
        run: |
          set -euo pipefail
          OUTPUT_FILE="${{ steps.lint.outputs.output_file }}"
          if [[ ! -f "${OUTPUT_FILE}" ]]; then
            exit 0
          fi

          PAPER="${{ steps.vars.outputs.paper }}"
          while IFS=: read -r filepath lineno col num rest; do
            msg="${rest#"${rest%%[! ]*}"}"
            if [[ -n "${filepath}" && "${lineno}" =~ ^[0-9]+$ ]]; then
              rel_path="${filepath#${GITHUB_WORKSPACE}/}"
              echo "::warning file=${rel_path},line=${lineno},col=${col}::ChkTeX W${num}: ${msg}"
            fi
          done < "${OUTPUT_FILE}"

      - name: Quality gate — fail on critical ChkTeX warnings
        if: always()
        run: |
          set -euo pipefail

          FAIL_ON_WARNINGS="${{ github.event.inputs.fail_on_warnings || 'false' }}"
          OUTPUT_FILE="${{ steps.lint.outputs.output_file }}"

          if [[ ! -f "${OUTPUT_FILE}" ]]; then
            echo "No ChkTeX output file — skipping quality gate."
            exit 0
          fi

          CRITICAL_COUNT=0
          for num in 11 17 19; do
            count="$(grep -cE "^.+:[0-9]+:[0-9]+:${num}:.+$" "${OUTPUT_FILE}" || true)"
            CRITICAL_COUNT=$(( CRITICAL_COUNT + count ))
          done

          if [[ "${CRITICAL_COUNT}" -gt 0 ]]; then
            echo "::error::❌ ${CRITICAL_COUNT} CRITICAL ChkTeX warning(s) found (W11/W17/W19)."
            exit 1
          fi

          if [[ "${FAIL_ON_WARNINGS}" == "true" ]]; then
            WARNING_COUNT="${{ steps.lint.outputs.warning_count }}"
            if [[ "${WARNING_COUNT}" -gt 0 ]]; then
              echo "::error::❌ ${WARNING_COUNT} ChkTeX warning(s) found and fail_on_warnings=true."
              exit 1
            fi
          fi

          echo "✅ ChkTeX quality gate passed."

      - name: Upload ChkTeX audit report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: chktex-audit-report
          path: audits/chktex-audit.md
          if-no-files-found: warn
          retention-days: 30

  # ============================================================
  # STAGE 3 — BUILD PAPER
  # Compile reflector.pdf from paper/paper.tex.
  # Depends on validate (all validation must pass first).
  # ============================================================

  build-paper:
    name: Build Paper
    needs: [validate]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine paper directory
        id: vars
        run: |
          set -euo pipefail
          PAPER="${{ github.event.inputs.paper || 'paper' }}"
          echo "paper=${PAPER}" >> "$GITHUB_OUTPUT"

      - name: Build LaTeX PDF
        uses: xu-cheng/latex-action@v4
        with:
          root_file: paper.tex
          working_directory: ${{ steps.vars.outputs.paper }}
          extra_system_packages: "biber"
          args: >-
            -pdf
            -halt-on-error
            -interaction=nonstopmode
            -recorder
            -synctex=1
            -file-line-error
            -shell-escape
            -f
            -gg
            -cd
            -r
            ../.latexmkrc

      - name: Print LaTeX diagnostics on failure
        if: failure()
        run: ./scripts/print-latex-diagnostics.sh "${{ steps.vars.outputs.paper }}"

      - name: Rename PDF to canonical asset name
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "${{ steps.vars.outputs.paper }}/.cache/out/paper.pdf" dist/reflector.pdf
          echo "Built: dist/reflector.pdf"

      - name: Upload paper PDF artifact
        uses: actions/upload-artifact@v7
        with:
          name: reflector-pdf
          path: dist/reflector.pdf
          if-no-files-found: error
          retention-days: 30

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: paper-build-artifacts
          path: ${{ steps.vars.outputs.paper }}/.cache/
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 7

  # ============================================================
  # STAGE 3 — BUILD MAGAZINE (parallel with build-paper)
  # Compile reflector-magazine.pdf and reflector-magazine-print.pdf.
  # Depends on validate (all validation must pass first).
  # ============================================================

  build-magazine:
    name: Build Magazine
    needs: [validate]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build magazine PDF (digital)
        uses: xu-cheng/latex-action@v4
        with:
          root_file: tex/magazine.tex
          working_directory: magazine
          args: >-
            -pdf
            -halt-on-error
            -interaction=nonstopmode
            -recorder
            -file-line-error
            -f
            -gg
            -cd
            -r
            tex/.latexmkrc

      - name: Build magazine PDF (print)
        uses: xu-cheng/latex-action@v4
        with:
          root_file: tex/magazine-print.tex
          working_directory: magazine
          args: >-
            -pdf
            -halt-on-error
            -interaction=nonstopmode
            -recorder
            -file-line-error
            -f
            -gg
            -cd
            -r
            tex/.latexmkrc

      - name: Copy magazine PDFs to dist
        run: |
          set -euo pipefail
          mkdir -p magazine/dist
          cp magazine/.cache/out/magazine.pdf magazine/dist/reflector-magazine.pdf
          cp magazine/.cache/out/magazine-print.pdf magazine/dist/reflector-magazine-print.pdf
          echo "Built: magazine/dist/reflector-magazine.pdf"
          echo "Built: magazine/dist/reflector-magazine-print.pdf"

      - name: Upload magazine PDF artifacts
        uses: actions/upload-artifact@v7
        with:
          name: reflector-magazine-pdfs
          path: magazine/dist/
          if-no-files-found: error
          retention-days: 30

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: magazine-build-artifacts
          path: magazine/.cache/
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 7

  # ============================================================
  # STAGE 4 — PACKAGE
  # Aggregate all publication artifacts into release/.
  # Generate: arXiv bundles, checksums, release manifest,
  # Zenodo readiness report, release notes, and source archive.
  # Depends on all build and audit stages.
  # ============================================================

  package:
    name: Package Release Artifacts
    needs: [build-paper, build-magazine, audit-chktex, validate]
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}
      version_no_v: ${{ steps.version.outputs.version_no_v }}
      tag: ${{ steps.version.outputs.tag }}
      release_dir: ${{ steps.version.outputs.release_dir }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve canonical version and paths
        id: version
        run: |
          set -euo pipefail

          VERSION="$(tr -d '[:space:]' < VERSION)"
          TAG="v${VERSION}"
          PAPER_NAME="reflector"
          RELEASE_DIR="release/${PAPER_NAME}-${TAG}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_no_v=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "paper_name=${PAPER_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_dir=${RELEASE_DIR}" >> "$GITHUB_OUTPUT"

          echo "Version: ${VERSION}"
          echo "Tag:     ${TAG}"
          echo "Release: ${RELEASE_DIR}"

      - name: Download paper PDF
        uses: actions/download-artifact@v4
        with:
          name: reflector-pdf
          path: dist/

      - name: Download magazine PDFs
        uses: actions/download-artifact@v4
        with:
          name: reflector-magazine-pdfs
          path: dist/magazine/

      - name: Download ChkTeX audit report
        uses: actions/download-artifact@v4
        with:
          name: chktex-audit-report
          path: audits/
        continue-on-error: true

      - name: Download publication readiness report
        uses: actions/download-artifact@v4
        with:
          name: publication-readiness-report
          path: audits/
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install --quiet pyyaml>=6.0

      - name: Assemble release directory
        run: |
          set -euo pipefail

          TAG="${{ steps.version.outputs.tag }}"
          PAPER_NAME="${{ steps.version.outputs.paper_name }}"
          RELEASE_DIR="${{ steps.version.outputs.release_dir }}"
          PAPER_DIR="${{ github.event.inputs.paper || 'paper' }}"

          mkdir --parents "${RELEASE_DIR}"

          # ── Core publication PDFs ────────────────────────────────────────
          cp dist/reflector.pdf "${RELEASE_DIR}/reflector.pdf"
          cp dist/magazine/reflector-magazine.pdf "${RELEASE_DIR}/reflector-magazine.pdf"
          cp dist/magazine/reflector-magazine-print.pdf "${RELEASE_DIR}/reflector-magazine-print.pdf"

          # ── Hero image ───────────────────────────────────────────────────
          if [[ -f "${PAPER_DIR}/figures/hero.png" ]]; then
            cp "${PAPER_DIR}/figures/hero.png" "${RELEASE_DIR}/hero.png"
          fi

          # ── Audit reports ────────────────────────────────────────────────
          for report in \
            "audits/chktex-audit.md" \
            "audits/publication-readiness.md" \
            "audits/research-peer-review-audit.md" \
            "audits/research-peer-review-tasks.md" \
            "audits/zenodo-readiness.md"; do
            if [[ -f "${report}" ]]; then
              cp "${report}" "${RELEASE_DIR}/$(basename "${report}")"
            fi
          done

          # ── Publication manifest copies ──────────────────────────────────
          cp release-manifest.json "${RELEASE_DIR}/release-manifest.json"
          cp publication.json "${RELEASE_DIR}/publication.json"

          echo "Release directory assembled at ${RELEASE_DIR}."
          find "${RELEASE_DIR}" -maxdepth 2 -type f | sort

      - name: Build arXiv source bundle
        run: |
          set -euo pipefail

          TAG="${{ steps.version.outputs.tag }}"
          PAPER_NAME="${{ steps.version.outputs.paper_name }}"
          RELEASE_DIR="${{ steps.version.outputs.release_dir }}"
          PAPER_DIR="${{ github.event.inputs.paper || 'paper' }}"
          ARXIV_DIR="${RELEASE_DIR}/arxiv"

          mkdir --parents "${ARXIV_DIR}"

          # ── Copy top-level LaTeX sources ─────────────────────────────────
          for file in "paper.tex" "references.bib"; do
            if [[ -f "${PAPER_DIR}/${file}" ]]; then
              cp "${PAPER_DIR}/${file}" "${ARXIV_DIR}/${file}"
            fi
          done

          # ── Copy build configuration ─────────────────────────────────────
          if [[ -f ".latexmkrc" ]]; then
            cp ".latexmkrc" "${ARXIV_DIR}/.latexmkrc"
          fi

          # ── Copy source directories ──────────────────────────────────────
          for directory in "sections" "figures" "diagrams" "assets" "references" "styles" "macros" "config"; do
            if [[ -d "${PAPER_DIR}/${directory}" ]]; then
              cp --recursive "${PAPER_DIR}/${directory}" "${ARXIV_DIR}/${directory}"
            fi
          done

          # ── Copy arXiv README manifest ───────────────────────────────────
          if [[ -f "${PAPER_DIR}/00README.json" ]]; then
            cp "${PAPER_DIR}/00README.json" "${ARXIV_DIR}/00README.json"
          fi

          echo "arXiv source bundle assembled at ${ARXIV_DIR}."
          find "${ARXIV_DIR}" -maxdepth 3 -type f | sort

      - name: Generate source archive (source.zip)
        run: |
          set -euo pipefail

          TAG="${{ steps.version.outputs.tag }}"
          PAPER_NAME="${{ steps.version.outputs.paper_name }}"
          RELEASE_DIR="${{ steps.version.outputs.release_dir }}"
          PAPER_DIR="${{ github.event.inputs.paper || 'paper' }}"

          SOURCE_ARCHIVE="${RELEASE_DIR}/source.zip"

          # Collect source files: paper sources + magazine sources + metadata
          zip -X -r "${SOURCE_ARCHIVE}" \
            "${PAPER_DIR}/paper.tex" \
            "${PAPER_DIR}/references.bib" \
            ".latexmkrc" \
            "publication.json" \
            "release-manifest.json" \
            "CITATION.cff" \
            "metadata/" \
            2>/dev/null || true

          for directory in "sections" "figures" "diagrams" "assets" "references" "styles" "macros" "config"; do
            if [[ -d "${PAPER_DIR}/${directory}" ]]; then
              zip -X -r "${SOURCE_ARCHIVE}" "${PAPER_DIR}/${directory}" 2>/dev/null || true
            fi
          done

          echo "Source archive: ${SOURCE_ARCHIVE}"

      - name: Package arXiv bundles (zip + tar.gz)
        run: |
          set -euo pipefail

          TAG="${{ steps.version.outputs.tag }}"
          PAPER_NAME="${{ steps.version.outputs.paper_name }}"
          RELEASE_DIR="${{ steps.version.outputs.release_dir }}"

          ARXIV_DIR="${RELEASE_DIR}/arxiv"
          ARXIV_ZIP="${RELEASE_DIR}/${PAPER_NAME}-arxiv-${TAG}.zip"
          ARXIV_TARGZ="${RELEASE_DIR}/${PAPER_NAME}-arxiv-${TAG}.tar.gz"

          # arXiv ZIP bundle
          (
            cd "${ARXIV_DIR}"
            zip -X -r "${OLDPWD}/${ARXIV_ZIP}" .
          )

          # arXiv TAR.GZ bundle (deterministic)
          tar --sort=name \
              --mtime="1970-01-01 00:00:00 UTC" \
              --owner=0 --group=0 --numeric-owner \
              -czf "${ARXIV_TARGZ}" \
              -C "${ARXIV_DIR}" .

          echo "arXiv ZIP:    ${ARXIV_ZIP}"
          echo "arXiv TAR.GZ: ${ARXIV_TARGZ}"

      - name: Generate checksums (SHA-256)
        run: |
          set -euo pipefail

          TAG="${{ steps.version.outputs.tag }}"
          PAPER_NAME="${{ steps.version.outputs.paper_name }}"
          RELEASE_DIR="${{ steps.version.outputs.release_dir }}"
          CHECKSUMS_FILE="${RELEASE_DIR}/checksums.txt"

          cd "${RELEASE_DIR}"
          find . -maxdepth 1 -type f \
            \( -name "*.pdf" -o -name "*.zip" -o -name "*.tar.gz" -o -name "*.json" -o -name "*.md" -o -name "*.png" -o -name "*.txt" \) \
            | sort \
            | xargs sha256sum \
            | sed 's|\./||' \
            > checksums.txt

          echo "Checksums generated:"
          cat checksums.txt

      - name: Generate release manifest (release-manifest.json)
        run: |
          set -euo pipefail

          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          PAPER_NAME="${{ steps.version.outputs.paper_name }}"
          RELEASE_DIR="${{ steps.version.outputs.release_dir }}"
          MANIFEST_PATH="${RELEASE_DIR}/manifest.json"

          TAG="${TAG}" \
          VERSION="${VERSION}" \
          PAPER_NAME="${PAPER_NAME}" \
          RELEASE_DIR="${RELEASE_DIR}" \
          MANIFEST_PATH="${MANIFEST_PATH}" \
          python - <<'PY'
          import json
          import os
          import subprocess
          from datetime import UTC, datetime
          from pathlib import Path

          tag = os.environ["TAG"]
          version = os.environ["VERSION"]
          paper_name = os.environ["PAPER_NAME"]
          release_dir = Path(os.environ["RELEASE_DIR"])
          manifest_path = Path(os.environ["MANIFEST_PATH"])
          repo = os.environ.get("GITHUB_REPOSITORY", "egohygiene/reflector")
          sha = os.environ.get("GITHUB_SHA", "")
          generated_at = datetime.now(UTC).strftime("%Y-%m-%dT%H:%M:%SZ")

          artifacts = {}
          for asset in sorted(release_dir.glob("*")):
              if asset.is_file() and asset.name != "manifest.json":
                  result = subprocess.run(
                      ["sha256sum", str(asset)],
                      capture_output=True, text=True, check=True,
                  )
                  sha256 = result.stdout.split()[0]
                  artifacts[asset.stem] = {
                      "filename": asset.name,
                      "path": str(asset.relative_to(Path.cwd())),
                      "sha256": sha256,
                      "size_bytes": asset.stat().st_size,
                  }

          manifest = {
              "schema_version": "1.0.0",
              "project": paper_name,
              "version": version,
              "tag": tag,
              "commit": sha,
              "generated_at": generated_at,
              "repository": f"https://github.com/{repo}",
              "release_url": f"https://github.com/{repo}/releases/tag/{tag}",
              "pages_url": f"https://{repo.split('/')[0]}.github.io/{repo.split('/')[1]}/",
              "artifacts": artifacts,
          }

          manifest_path.write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")
          print(f"Manifest written to {manifest_path}")
          print(json.dumps(manifest, indent=2))
          PY

      - name: Generate Zenodo readiness report
        run: |
          set -euo pipefail

          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_DIR="${{ steps.version.outputs.release_dir }}"
          ZENODO_REPORT="${RELEASE_DIR}/zenodo-readiness.md"

          TAG="${TAG}" \
          VERSION="${VERSION}" \
          ZENODO_REPORT="${ZENODO_REPORT}" \
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          import yaml

          tag = os.environ["TAG"]
          version = os.environ["VERSION"]
          report_path = Path(os.environ["ZENODO_REPORT"])
          repo = os.environ.get("GITHUB_REPOSITORY", "egohygiene/reflector")

          metadata = yaml.safe_load(Path("metadata/publication.yaml").read_text(encoding="utf-8"))
          zenodo = json.loads(Path(".zenodo.json").read_text(encoding="utf-8"))
          citation = yaml.safe_load(Path("CITATION.cff").read_text(encoding="utf-8"))

          release_url = f"https://github.com/{repo}/releases/tag/{tag}"
          source_zip = f"https://github.com/{repo}/archive/refs/tags/{tag}.zip"
          source_targz = f"https://github.com/{repo}/archive/refs/tags/{tag}.tar.gz"

          checks = [
              ("metadata/publication.yaml version matches VERSION", str(metadata.get("version")) == version),
              (".zenodo.json version matches VERSION", str(zenodo.get("version")) == version),
              ("CITATION.cff version matches VERSION", str(citation.get("version")) == version),
              ("ORCID present in .zenodo.json creators", bool((zenodo.get("creators") or [{}])[0].get("orcid"))),
              (".zenodo.json has title", bool(zenodo.get("title"))),
              (".zenodo.json has description", bool(zenodo.get("description"))),
              (".zenodo.json has upload_type", bool(zenodo.get("upload_type"))),
              ("CITATION.cff has orcid", any(a.get("orcid") for a in (citation.get("authors") or []))),
          ]

          all_passed = all(ok for _, ok in checks)
          status = "✅ ready" if all_passed else "⚠️ blocked"

          artifact_inventory = [
              "reflector.pdf",
              "reflector-magazine.pdf",
              "reflector-magazine-print.pdf",
              f"reflector-arxiv-{tag}.zip",
              f"reflector-arxiv-{tag}.tar.gz",
              "checksums.txt",
              "manifest.json",
              "source.zip",
          ]

          lines = [
              f"# Zenodo Readiness Report — {tag}",
              "",
              f"- **Status:** {status}",
              f"- **Version:** `{version}`",
              f"- **Tag:** `{tag}`",
              f"- **Release URL:** {release_url}",
              f"- **Source ZIP:** {source_zip}",
              f"- **Source TAR.GZ:** {source_targz}",
              "",
              "## Validation Checks",
              "",
          ]
          for name, ok in checks:
              lines.append(f"- [{'x' if ok else ' '}] {name}")

          lines += [
              "",
              "## Artifact Inventory",
              "",
          ]
          for artifact in artifact_inventory:
              lines.append(f"- `{artifact}`")

          lines += [
              "",
              "## Next Steps",
              "",
              "1. Verify GitHub Release contains all artifacts above.",
              "2. Upload artifacts to Zenodo deposit manually.",
              "3. Assign DOI via Zenodo.",
              "4. Update `metadata/publication.yaml`, `CITATION.cff`, and `.zenodo.json` with assigned DOI.",
              "5. Tag a metadata-update release.",
              "",
          ]

          report_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(f"Zenodo readiness report written to {report_path}")
          PY

      - name: Generate release notes from changelog
        run: |
          set -euo pipefail

          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_DIR="${{ steps.version.outputs.release_dir }}"
          RELEASE_NOTES="${RELEASE_DIR}/release-notes.md"

          {
            printf "## %s\n\n" "${TAG}"
            awk -v version="${VERSION}" '
              $0 ~ "^## \\[" version "\\]" {capture=1; next}
              $0 ~ "^## \\[" && capture==1 {exit}
              capture==1 {print}
            ' CHANGELOG.md
          } > "${RELEASE_NOTES}"

          echo "Release notes written to ${RELEASE_NOTES}"
          cat "${RELEASE_NOTES}"

      - name: Verify release artifacts
        run: |
          set -euo pipefail

          RELEASE_DIR="${{ steps.version.outputs.release_dir }}"

          required_files=(
            "${RELEASE_DIR}/reflector.pdf"
            "${RELEASE_DIR}/reflector-magazine.pdf"
            "${RELEASE_DIR}/reflector-magazine-print.pdf"
            "${RELEASE_DIR}/checksums.txt"
            "${RELEASE_DIR}/release-manifest.json"
            "${RELEASE_DIR}/manifest.json"
            "${RELEASE_DIR}/zenodo-readiness.md"
            "${RELEASE_DIR}/release-notes.md"
          )

          MISSING=0
          for f in "${required_files[@]}"; do
            if [[ ! -f "${f}" ]]; then
              echo "::error::Missing required release artifact: ${f}"
              MISSING=$(( MISSING + 1 ))
            else
              echo "✅ ${f}"
            fi
          done

          if [[ "${MISSING}" -gt 0 ]]; then
            echo "::error::${MISSING} required release artifact(s) missing."
            exit 1
          fi

          echo ""
          echo "=== Release artifact inventory ==="
          find "${RELEASE_DIR}" -maxdepth 1 -type f | sort

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts-${{ steps.version.outputs.tag }}
          path: |
            ${{ steps.version.outputs.release_dir }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: release-build-failure-artifacts
          path: |
            dist/
            audits/
          if-no-files-found: warn
          retention-days: 7

  # ============================================================
  # STAGE 5 — RELEASE
  # Create annotated release tag (if missing) and publish a
  # GitHub Release with all canonical publication artifacts.
  # Only runs on push to main or explicit workflow_dispatch.
  # Skipped on dry_run=true.
  # ============================================================

  release:
    name: Create GitHub Release
    needs: [package, validate-reuse]
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts-${{ needs.package.outputs.tag }}
          path: release-staging/

      - name: List release staging contents
        run: |
          echo "=== Release staging directory ==="
          find release-staging/ -maxdepth 2 -type f | sort

      - name: Create annotated release tag
        if: github.event.inputs.dry_run != 'true'
        run: |
          set -euo pipefail

          TAG="${{ needs.package.outputs.tag }}"

          if git rev-parse --verify --quiet "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists — no action required."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Publication release ${TAG}"
          git push origin "${TAG}"
          echo "Created and pushed tag: ${TAG}"

      - name: Create GitHub Release
        if: github.event.inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.package.outputs.tag }}
          name: reflector ${{ needs.package.outputs.tag }}
          generate_release_notes: true
          body_path: release-staging/release-notes.md
          files: |
            release-staging/reflector.pdf
            release-staging/reflector-magazine.pdf
            release-staging/reflector-magazine-print.pdf
            release-staging/source.zip
            release-staging/checksums.txt
            release-staging/manifest.json
            release-staging/release-manifest.json
            release-staging/publication-readiness.md
            release-staging/chktex-audit.md
            release-staging/zenodo-readiness.md

      - name: Print dry run summary
        if: github.event.inputs.dry_run == 'true'
        run: |
          echo "=== DRY RUN — GitHub Release skipped ==="
          echo "Tag:     ${{ needs.package.outputs.tag }}"
          echo "Version: ${{ needs.package.outputs.version }}"
          echo ""
          echo "Artifacts that would be uploaded:"
          find release-staging/ -maxdepth 1 -type f | sort

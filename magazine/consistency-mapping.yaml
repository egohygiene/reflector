#
# magazine/consistency-mapping.yaml
#
# Cross-artifact consistency mapping between the reflector manuscript (paper/)
# and the visual companion magazine (magazine/).
#
# Governs the magazine-to-manuscript consistency audit defined in:
#   specs/publication/magazine-consistency.spec.md
#
# This file declares relationships between manuscript and magazine content
# where they cannot be derived reliably from existing registries alone.
# It does not duplicate the complete content of either artifact.
#
# Relationship types:
#   derived-from   — magazine content is visually derived from the manuscript source
#   companion-to   — magazine content accompanies a manuscript section without being derived
#   independent    — magazine content has no required manuscript equivalent
#
# Relationship strength:
#   required       — violation produces FAIL status
#   advisory       — violation produces WARN status
#
# ---------------------------------------------------------------------------

spec_version: "1.0"

# ---------------------------------------------------------------------------
# Metadata synchronization rules
#
# Declare which publication metadata fields must or should remain synchronized
# between the canonical metadata layer and magazine artifacts.
# ---------------------------------------------------------------------------

metadata_sync:
  - id: meta-publication-version
    rule: RULE-007
    manuscript_source: "metadata/publication.yaml"
    manuscript_field: "version"
    magazine_target: "magazine/spec.md"
    magazine_field: "version"
    relationship: advisory
    description: >-
      Publication version should be consistent between the canonical metadata
      and the magazine spec. Advisory divergence is acceptable when the magazine
      spec version tracks visual iteration rather than publication version.

# ---------------------------------------------------------------------------
# Magazine page mappings
#
# Declares the relationship between magazine pages and their corresponding
# manuscript sources. Every page file declared in magazine/tex/magazine.tex
# must have a corresponding entry here for documentation purposes.
#
# Page existence is validated structurally (RULE-004).
# Manuscript source existence is validated as advisory (RULE-005).
# ---------------------------------------------------------------------------

page_mappings:

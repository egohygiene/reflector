# ---------------------------------------------------------------------------
# Intentional exceptions
#
# Each exception documents an intentional difference that would otherwise
# be flagged by the consistency audit. Exceptions must be narrowly scoped.
# Directory-wide or rule-wide suppressions are not permitted.
#
# Required fields: id, rule, rationale, scope, approved_by
# Optional fields: review_date
# ---------------------------------------------------------------------------

exceptions:
  - id: exc-magazine-source-section-files
    rule: RULE-005
    rationale: >-
      Several magazine pages map to manuscript section files (*.tex under
      paper/sections/) that may not yet exist as individual files when the
      manuscript is organized as a single paper.tex. The mapping uses the most
      specific available source path. Missing section files are reported as
      warnings, not errors, because the manuscript content may be embedded
      in paper.tex rather than split into section files.
    scope: "page_mappings entries with manuscript_source pointing to paper/sections/"
    approved_by: "author"
    review_date: "2027-01-01"
